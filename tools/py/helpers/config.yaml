model_default_options:
  num_ctx: 16384
  num_predict: -1
  seed: 42
  keep_alive: 0
  temperature: 0.1
  repeat_penalty: 1.1

top_models:
  - "gemma4:e4b-it-qat"
  - "qwen3.5:4b-q8_0"
  - "qwen3.5:9b-q4_K_M"
  - "llama3.1:8b-text-q4_K_M"
  - "gemma4:e2b"
  # - "phi4-mini:3.8b-q8_0" # Passed: 5, Failed: 18
  # - "falcon3:7b" # Passed: 13, Failed: 10
  # - "llama3.2:3b-instruct-q8_0" # Passed: 7, Failed: 16
  # - "gemma4:12b-it-qat" # gpu not full, not engough content, 32k might be useds but slow!
  # - "gemma2:9b-instruct-q5_K_M" # gpu not full, empty response, to get anything - ctx should be small and it does follows prompt
  # - "llama3.1:8b-instruct-q6_K" # gpu not full, not good output
  # - "qwen3.5:9b-q4_K_M" # strange GPU, slow, but long output
  # - "deepseek-r1:7b" # strange output

gemini_models:
  - "gemini-3.1-flash-lite"
  - "gemini-3.5-flash"
  - "gemma-4-26b-a4b-it"
  - "gemma-4-31b-it"

models:
  - name: "llama3.1:8b-text-q4_K_M"
  - name: "gemma4:e4b-it-qat"
  - name: "llama3.2:3b-instruct-q8_0"
  - name: "qwen2.5:3b-instruct-q8_0"
  - name: "qwen2.5:7b-instruct-q4_K_M"
  - name: "mistral:7b-instruct-v0.3-q4_K_M"

  - name: "qwen3.5:9b-q4_K_M"
  - name: "gemma4:12b-it-qat"
    options:
      num_predict: 4000
      repeat_penalty: 1.15
  - name: "qwen3.5:4b-q8_0"
  - name: "llama3.1:8b-instruct-q6_K"
    options:
      temperature: 0.3
      top_p: 0.85
      repeat_penalty: 1.05
  - name: "gemma2:9b-instruct-q5_K_M"
  - name: "gemma4:e2b"
  - name: "gemma4:e2b-it-qat"

  - name: "deepseek-r1:7b"
    options:
      num_predict: 8192

  - name: "qwen2.5-coder:7b"
  - name: "llama3.1:8b"
  - name: "codegemma:7b-code"
  - name: "deepseek-r1:1.5b"
  - name: "phi4-mini:3.8b-q8_0"
  - name: "falcon3:7b"
  # cloud models
  - name: "gemini-3.1-flash-lite"
    options:
      use_default: False
      temperature: 0.1
      maxRetries: 3
  - name: "gemini-3.5-flash"
    options:
      use_default: False
      temperature: 0.1
      maxRetries: 3
  - name: "gemma-4-26b-a4b-it"
    options:
      use_default: False
      temperature: 0.1
      maxRetries: 3
  - name: "gemma-4-31b-it"
    options:
      use_default: False
      temperature: 0.1
      maxRetries: 3

eval_model: "gemma4:e2b"
root_dir: "../../.."
tmp_output_dir: "{root_dir}/tmp/outputs"
tmp_input_dir: "{root_dir}/tmp/inputs"
trulens_db_url: "sqlite:///{root_dir}/tmp/outputs/truelens/default.sqlite"
prepare_llm_prompt_script: "{root_dir}/cv/tools/prepare_llm_prompt.py"

jobs:
  - name: "job_tesla"
    ground_truth: "{tmp_input_dir}/job_tesla_gt.md"
    description: "{root_dir}/tools/py/job_finder/data/test/tesla_go.txt"
    llm_prompt: "{tmp_output_dir}/job_tesla/llm_prompt.md"
