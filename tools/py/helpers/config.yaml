model_default_options:
  num_ctx: 16384
  num_predict: -1
  seed: 42
  keep_alive: 0
  temperature: 0.1
  repeat_penalty: 1.1

top_models:
  - "gemma4:e2b"
  - "gemma4:e4b-it-qat"
  - "qwen3.5:4b-q8_0"
  - "gemma4:12b-it-qat"
  - "gemma2:9b-instruct-q5_K_M"
  - "llama3.1:8b-instruct-q6_K"
  - "qwen3.5:9b-q4_K_M"
  - "deepseek-r1:7b"

models:
  - name: "llama3.1:8b-text-q4_K_M"
  - name: "gemma4:e4b-it-qat"
  - name: "llama3.2:3b-instruct-q8_0"
  - name: "qwen2.5:3b-instruct-q8_0"
  - name: "qwen2.5:7b-instruct-q4_K_M"
  - name: "mistral:7b-instruct-v0.3-q4_K_M"

  - name: "qwen3.5:9b-q4_K_M"
    options:
      num_predict: 4000
      repeat_penalty: 1.15
  - name: "gemma4:12b-it-qat"
    options:
      num_predict: 4000
      repeat_penalty: 1.15
  - name: "qwen3.5:4b-q8_0"
  - name: "llama3.1:8b-instruct-q6_K"
    options:
      temperature: 0.3
      top_p: 0.85
      repeat_penalty: 1.05
  - name: "gemma2:9b-instruct-q5_K_M"
  - name: "gemma4:e2b"
  - name: "gemma4:e2b-it-qat"

  - name: "deepseek-r1:7b"
    options:
      num_predict: 8192

  - name: "qwen2.5:7b"
  - name: "qwen2.5-coder:7b"
  - name: "llama3.1:8b"
  - name: "codegemma:7b-code"
  - name: "deepseek-r1:1.5b"

eval_model: "gemma4:e2b"
root_dir: "../../.."
tmp_output_dir: "{root_dir}/tmp/outputs"
tmp_input_dir: "{root_dir}/tmp/inputs"
trulens_db_url: "sqlite:///{root_dir}/tmp/outputs/truelens/default.sqlite"
prepare_llm_prompt_script: "{root_dir}/cv/tools/prepare_llm_prompt.py"

jobs:
  - name: "job_tesla"
    ground_truth: "{tmp_input_dir}/job_tesla_gt.md"
    description: "{root_dir}/tools/py/job_finder/data/test/tesla_go.txt"
    llm_prompt: "{tmp_output_dir}/job_tesla/llm_prompt.md"
